<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="navbar bg-body-tertiary">
            <div class="navBar container-fluid">
                <div>
                    <span class="navbar-brand mb-0 h1">Tienda virtual</span>
                </div>
                <div>
                    Contador<span class="badge bg-secondary">0</span>
                </div>
            </div>

        </nav>
    </header>
    <main>
        <div class="container-productos">
            <div id="titulo-productos">
                <h1>Productos</h1>

            </div>
            <section class="tarjeta-productos">
                <!--Tarjeta 1-->
                <div class="card" style="width: 18rem">
                    <img src="https://vaquitaexpress.com.co/media/catalog/product/cache/e89ece728e3939ca368b457071d3c0be/7/7/7705326011404.jpg"
                        class="card-img-top" alt="foto de un pan" />
                    <div class="card-body">
                        <h5 class="card-title" id="nombre-producto">Pan</h5>
                        <p class="card-text">
                            <span id="precio-producto">$8000</span>
                        </p>
                        <button type="button" class="btn btn-primary btn-agregar" data-nombre="pan"
                            data-precio="8000">Agregar al carrito</button>
                    </div>
                </div>
                <!--Tarjeta 2-->
                <div class="card" style="width: 18rem">
                    <img src="https://media.istockphoto.com/id/819945704/es/foto/bandeja-de-huevos.jpg?s=612x612&w=0&k=20&c=s0gSDVckfduXf4wnVPmgCapWmLAbCqnsvc6QJlmFPzM="
                        class="card-img-top" alt="foto de un carton de huevos" />
                    <div class="card-body">
                        <h5 class="card-title" id="nombre-producto">Cartón de huevos x30 U</h5>
                        <p class="card-text">
                            <span id="precio-producto">$ 12000</span>
                        </p>
                        <button type="button" class="btn btn-primary btn-agregar" data-precio="12000"
                            data-nombre="Cartón de huevos x30 U">Agregar al carrito</button>
                    </div>
                </div>
                <!--Tarjeta 3-->
                <div class="card" style="width: 18rem">
                    <img src="https://exitocol.vtexassets.com/arquivos/ids/30779233/Leche-Entera-En-Bolsa-Pack-X-6-Unds-900-Ml-Cu-806304_a.jpg?v=638931930226870000"
                        class="card-img-top" alt="bolsa de leche" />
                    <div class="card-body">
                        <h5 class="card-title" id="nombre-producto">Leche COLANTA entera x6und</h5>
                        <p class="card-text">
                            <span id="precio-producto">$ 29950</span>
                        </p>
                        <button type="button" class="btn btn-primary btn-agregar" data-precio="29950"
                            data-nombre="Leche COLANTA entera x6und">Agregar al carrito</button>
                    </div>
                </div>
                <!--Tarjeta 4-->
                <div class="card" style="width: 18rem">
                    <img src="https://exitocol.vtexassets.com/arquivos/ids/32485193/Mantequilla-Sin-Sal-Barra-X-250-gr-20590_a.jpg?v=639064130119600000"
                        class="card-img-top" alt="mantequilla" />
                    <div class="card-body">
                        <h5 class="card-title" id="nombre-producto">Mantequilla COLANTA sin sal esparcible (250 gr)</h5>
                        <p class="card-text">
                            <span id="precio-producto">$ 15450</span>
                        </p>
                        <button type="button" class="btn btn-primary btn-agregar" data-precio=" 15450" data-nombre="Mantequilla COLANTA sin sal esparcible (250 gr)">Agregar al carrito</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div class="container">
        <section class="carrito">

            <div>
                <h2>Carrito</h2>
                <ul id="lista-carrito">
                    <li id="msg-vacio">Tu carrito está vacío</li>
                </ul>
            </div>
            <h3>total carrito</h3>
            <div class="texto-total-carrito">
                <p>El total es: <span id="total">0</span></p>
            </div>
            <div>
                <button type="button" id="btn-vaciar" class="btn btn-danger">Vaciar carrito</button>

            </div>

        </section>

    </div>





    <!--Script js-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>

</html>
